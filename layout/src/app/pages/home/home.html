<main class="relative flex flex-col min-h-screen bg-slate-900 overflow-hidden">

    <!-- Fundo decorativo -->
    <div class="absolute inset-0">
        <div class="absolute top-0 left-0 w-72 h-72 bg-blue-500/20 blur-3xl rounded-full"></div>
        <div class="absolute bottom-0 right-0 w-72 h-72 bg-blue-400/10 blur-3xl rounded-full"></div>
    </div>

    <!-- Conteúdo -->
    <div class="relative z-10">

        <!-- Header -->
        <header class="text-center md:text-left px-6 pt-16 pb-10 max-w-6xl mx-auto w-full">
            <h2 class="text-4xl md:text-5xl font-extrabold text-slate-50 leading-tight">
                Bem-vindo à <span class="text-blue-400">Aura</span> app
            </h2>

            <p class="mt-4 text-lg text-slate-300 max-w-xl">
                Conheça algumas tecnologias front-end
            </p>
        </header>

        <!-- Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 px-6 pb-16 max-w-6xl mx-auto w-full">

            <article *ngFor="let item of requisicao"
                class="group bg-white/90 backdrop-blur-md rounded-2xl shadow-md hover:shadow-2xl transition-all duration-300 p-6 border border-slate-200 hover:-translate-y-2 hover:scale-[1.02]">

                <div class="flex flex-col gap-4">

                    <!-- Título -->
                    <h3 class="text-xl font-bold text-slate-800 group-hover:text-blue-500 transition">
                        {{item.tecnologia}}
                    </h3>

                    <!-- Linha -->
                    <div class="w-12 h-1 bg-blue-500 rounded-full group-hover:w-16 transition-all duration-300"></div>

                    <!-- Descrição dinâmica -->
                    <p class="text-slate-600 text-sm leading-relaxed">
                        {{item.descricao}}
                    </p>
                </div>
            </article>

        </div>

    </div>
</main>
