<main class="flex flex-col min-h-screen bg-slate-900 ">
    <header class="md-10 text-center md:text-left sm:text-right">
        <h2 class="text-3xl font-extrabold text-slate-50">Bem-vindo à Aura app</h2>
        <p class="mt-3 text-lg text-slate-50">Conheça algumas tecnologias front-end</p>
    </header>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 p-6">
        <article *ngFor="let item of requisicao"
            class="bg-white rounded-2xl shadow-md hover:shadow-xl transition duration-300 p-5 border border-gray-100 hover:-translate-y-1">
                
            <div class="flex flex-col gap-3">

                <!-- Título -->
                <h3 class="text-xl font-semibold text-gray-800">
                    {{item.tecnologia}}
                </h3>

                <!-- Linha decorativa -->
                <div class="w-10 h-1 bg-blue-500 rounded"></div>

                <!-- Descrição -->
                <p class="text-gray-600 text-sm leading-relaxed">
                    {{item.descricao}}
                </p>

            </div>
        </article>
  </div>
</main>
